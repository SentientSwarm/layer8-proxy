# Example locksmith config — site repos render their own version of
# this file from canonical hermes-site/tools/*.yaml entries.
#
# Schema: agent-locksmith v1.1.0
# See agent-locksmith/config.example.yaml for the full reference.

listen:
  host: "0.0.0.0"
  port: 9200

# Optional inbound auth for requests from agents.
# inbound_auth:
#   mode: "bearer"
#   token: "${LOCKSMITH_INBOUND_TOKEN}"

# HTTP CONNECT proxy used for tools whose egress is `proxied`.
# layer8-proxy's compose puts pipelock on the same network as locksmith,
# resolvable as `pipelock`.
egress_proxy: "http://pipelock:8888"

logging:
  level: "info"

shutdown:
  drain_window_seconds: 30

# Tool definitions. Empty in the example; site repos populate this.
tools: []
