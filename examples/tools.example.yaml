# Example: tool entries inside a complete locksmith config.
# Site repos generate their own tools list from canonical
# hermes-site/tools/*.yaml entries via render-configs.py.
#
# Schema: agent-locksmith v1.1.0 (see ../locksmith/config.example.yaml).

tools:
  - name: github
    description: "GitHub REST API"
    upstream: "https://api.github.com"
    egress: proxied
    auth:
      header: Authorization
      value: "Bearer ${GITHUB_TOKEN}"
    timeouts:
      request_seconds: 30
      idle_seconds: 60
    body_limit_bytes: 10485760

  - name: anthropic
    description: "Anthropic Messages API"
    upstream: "https://api.anthropic.com"
    egress: proxied
    auth:
      header: x-api-key
      value: "${ANTHROPIC_API_KEY}"
    timeouts:
      request_seconds: 600    # multi-minute generations (R-F12)
      idle_seconds: 600

  - name: lmstudio
    description: "Off-box LM Studio (LAN)"
    upstream: "http://lmstudio.lan:1234"   # replace with your inference host
    egress: direct                          # LAN — bypasses pipelock
    timeouts:
      request_seconds: 600
      idle_seconds: 600

  - name: lf-scan
    description: "PromptGuard / CodeShield sidecar"
    upstream: "http://lf-scan:9100"         # docker-compose service name
    egress: direct
    auth:
      header: X-Internal-Token
      value: "${LF_SCAN_INTERNAL_TOKEN}"
    timeouts:
      request_seconds: 5
      idle_seconds: 5
