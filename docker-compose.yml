# layer8-proxy bundle — locksmith + pipelock + lf-scan.
# Site repos override mounts and volumes via docker-compose.override.yml.
#
# Container runtime: defaults to Docker. For Podman, set:
#     export COMPOSE="podman compose"
# in your shell before running scripts. Compose file syntax is identical.

services:
  locksmith:
    build:
      context: ./locksmith
      args:
        LOCKSMITH_VERSION: ${LOCKSMITH_VERSION:-v2.1.0}
    image: layer8-proxy/locksmith:${LOCKSMITH_VERSION:-v2.1.0}
    container_name: layer8-locksmith
    restart: unless-stopped
    # Host-side port binding is the SITE's decision (loopback-only for
    # same-host deploys, 0.0.0.0 for cross-host). Sites add a `ports:`
    # block in their docker-compose.override.yml. Inside the compose
    # network, locksmith is always reachable as `locksmith:9200`.
    expose:
      - "9200"
    extra_hosts:
      # host.docker.internal is Docker-Desktop-specific by default.
      # Mapping it to host-gateway makes it resolve on Podman and Linux Docker too,
      # so tool entries can use one hostname regardless of runtime.
      - "host.docker.internal:host-gateway"
    volumes:
      - ${LOCKSMITH_CONFIG_PATH:-./locksmith/config.example.yaml}:/etc/locksmith/config.yaml:ro
      - ${LOCKSMITH_SECRETS_DIR:-./locksmith/secrets}:/etc/locksmith/secrets:ro
      - ${LOCKSMITH_DATA_VOLUME:-locksmith_data}:/var/lib/locksmith
      - ${LOCKSMITH_LOG_VOLUME:-locksmith_log}:/var/log/locksmith
    depends_on:
      pipelock:
        condition: service_healthy
      lf-scan:
        condition: service_healthy

  pipelock:
    build:
      context: ./pipelock
      args:
        PIPELOCK_VERSION: ${PIPELOCK_VERSION:-2.3.0}
    image: layer8-proxy/pipelock:${PIPELOCK_VERSION:-2.3.0}
    container_name: layer8-pipelock
    restart: unless-stopped
    # Pipelock is reached only by locksmith (intra-compose network).
    # No host-side port mapping in the base file. Sites can add one for
    # debugging via their override if they need it.
    expose:
      - "8888"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${PIPELOCK_CONFIG_PATH:-./pipelock/pipelock.example.yaml}:/etc/pipelock/pipelock.yaml:ro
      - ${PIPELOCK_LOG_VOLUME:-pipelock_log}:/var/log/pipelock

  lf-scan:
    build:
      context: ./lf-scan
    image: layer8-proxy/lf-scan:0.1.0
    container_name: layer8-lf-scan
    restart: unless-stopped
    expose:
      - "9100"
    environment:
      LF_SCAN_INTERNAL_TOKEN: ${LF_SCAN_INTERNAL_TOKEN:?LF_SCAN_INTERNAL_TOKEN required}
      # PromptGuard 2 is a gated Hugging Face model — operator must provide
      # an HF token (https://hf.co/settings/tokens, accept Meta's terms first).
      # Required on first run to download model weights; after that, weights
      # cache in the container layer.
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      # Persist the Hugging Face cache across container recreates so we don't
      # re-download model weights every restart.
      - lf_scan_hf_cache:/home/lfscan/.cache/huggingface

volumes:
  locksmith_data:
  locksmith_log:
  pipelock_log:
  lf_scan_hf_cache:
